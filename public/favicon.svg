<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Glow effect filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradients matching the design spec -->
    <linearGradient id="blue-purple" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0099ff" />
      <stop offset="100%" stop-color="#6a4cf5" />
    </linearGradient>
  </defs>

  <!-- Glowing outer circle border -->
  <circle cx="64" cy="64" r="54" stroke="url(#blue-purple)" stroke-width="4" filter="url(#glow)" stroke-dasharray="8 4" opacity="0.8"/>
  <circle cx="64" cy="64" r="46" stroke="#1c1c1c" stroke-width="2"/>

  <!-- Centered sharp S-Rank Shadow Monarch Portal Crest / Crown -->
  <path d="M64 18 L84 45 L70 45 L80 80 L64 58 L48 80 L58 45 L44 45 Z" fill="url(#blue-purple)" filter="url(#glow)"/>
  
  <!-- Dagger blade accents -->
  <path d="M64 58 L64 110" stroke="#0099ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
</svg>
